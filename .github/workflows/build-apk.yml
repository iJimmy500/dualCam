name: Build & Release Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#android-v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}"               >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}"     >> $GITHUB_OUTPUT
            echo "TAG=android-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk dualCam-android.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.TAG }}" dualCam-android.apk \
            --title "dualCam Android ${{ steps.ver.outputs.VERSION }}" \
            --notes "$(cat <<'NOTES'
          ## Install

          Download \`dualCam-android.apk\` below, open it on your phone, and allow
          "Install unknown apps" when prompted. No Play Store or developer account needed.

          > Requires Android 11+ on a phone with concurrent-camera support.
          NOTES
          )"
